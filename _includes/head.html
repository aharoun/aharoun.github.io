<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script>
    (function () {
      var t = localStorage.getItem("theme");
      if (!t) {
        t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <script src="https://kit.fontawesome.com/4fb5cb0243.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@v1.9.1/css/academicons.min.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap" />
  <link rel="stylesheet" href="/assets/style.css" />

  {% if page.layout == "home" %}
  <title>{{ site.title }}</title>
  {% else %}
  <title>{{ site.title }} - {{ page.title }}</title>
  {% endif %}

  {% if site.analytics %}
  {% include analytics.html %}
  {% endif %}

  {% seo title=false %}
</head>
