<div class="hero">
  <div class="hero-text">
    <h1 class="name">{{ site.firstname }} {{ site.lastname }}</h1>
    <div class="role">Principal Economist &middot; Federal Reserve Board</div>
    <p class="bio">I work on macroeconomics, with a particular interest in firm dynamics, economic growth and innovation.</p>
    <div class="contacts">
      <a href="mailto:{{ site.email }}" title="Email"><i class="fas fa-envelope"></i></a>
      {% if site.scholar %}
      <a href="{{ site.scholar }}" title="Google Scholar"><i class="ai ai-google-scholar"></i></a>
      {% endif %}
      {% if site.github %}
      <a href="https://github.com/{{ site.github }}" title="GitHub"><i class="fab fa-github"></i></a>
      {% endif %}
      {% if site.cv %}
      <a href="{{ site.cv }}" class="cv-link" title="Curriculum Vitae">CV</a>
      {% endif %}
    </div>
  </div>
  <img class="avatar" src="{{ site.photo }}" alt="{{ site.firstname }} {{ site.lastname }}" />
</div>
